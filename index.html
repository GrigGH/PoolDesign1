<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three JS</title>
    <href link="style.css"></href>
</head>

<body>
    <div id="ui">
        <div>
            <labeL>Width: </labeL>
            <input id="widthSlider" type="range" min="0.1" max="5" step="0.1" value="1">
            <span id="widthVal">1</span>
        </div>
        <div>
            <label>Height: </label>
            <input id="lengthSlider" type="range" min="0.1" max="5" step="0.1" value="1">
            <span id="lengthVal">1</span>
        </div>
        <div>
            <label>Depth: </label>
            <input id="depthSlider" type="range" min="0.1" max="5" step="0.1" value="1">
            <span id="depthVal">1</span>
        </div>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="./pool.js" type="module"></script>

</body>

</html>
