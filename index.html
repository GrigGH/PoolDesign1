<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three JS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui" class="layout">

        <div id="values">
            <div id="width-value">
                Width
                <div class="aligner">
                    <div id="widthVal">1</div>
                    <span>m</span>
                </div>
            </div>
            <div id="length-value">
                Length
                <div class="aligner">
                    <div id="lengthVal">1</div>
                    <span>m</span>
                </div>
            </div>

            <div id="depth-value">
                Depth
                <div class="aligner">
                    <div id="depthVal">1</div>
                    <span>m</span>
                </div>
            </div>
        </div>


        <div style="color: black;">
            <label>Width: </label>
            <input id="widthSlider" type="range" min="0.1" max="5" step="0.1" value="1">
        </div>
        <div style="color: black;">
            <label>Length: </label>
            <input id="lengthSlider" type="range" min="0.1" max="5" step="0.1" value="1">
        </div>
        <div style="color: black;">
            <label>Depth: </label>
            <input id="depthSlider" type="range" min="0.1" max="5" step="0.1" value="1">
        </div>




    </div>
    <div id="other-options">
        <div>

            <label class="option" role="button" tabindex="0">
                <!-- <img class="poolImg" src="Images/SwimmingPool.png" alt="Pool Image"> -->
                 Swimming Pool
            </label>
        </div>
        <div>
            <label class="option" role="button" tabindex="0">Steps</label>
        </div>
        <div>
            <label class="option" role="button" tabindex="0">Measurements</label>
        </div>
        <div>
            <label class="option" role="button" tabindex="0">Lighting</label>
        </div>
        <div>
            <label class="option" role="button" tabindex="0">Colour</label>
        </div>
        <div>
            <label class="option" role="button" tabindex="0">Shutter</label>
        </div>
        <div>
            <label class="option" role="button" tabindex="0">Display</label>
        </div>
        <div>
            <label class="option" role="button" tabindex="0">Save</label>
        </div>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="./pool.js" type="module"></script>

</body>

</html>
